<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://unpkg.com/lucide-icons@latest/dist/style.css">
    <title>Pepe Plush Store</title>
    <style>
        body {
            background-color: #050505;
            color: #00FF00; /* Glowing green text */
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }
        h1, h2, h3 { text-shadow: 0 0 10px #00FF00; }
        /* Add custom CSS animations */
        .float {
            animation: float 3s ease-in-out infinite;
        }
        /* Example of more custom animations like pulse, shimmer, and blob morph utility classes here */
        @keyframes float {
            0%, 100% { transform: translatey(0); }
            50% { transform: translatey(-10px); }
        }
        /* Styling for the cart panel */
        .cart-panel {
            position: fixed;
            right: -300px;
            top: 0;
            width: 300px;
            height: 100%;
            background-color: #222;
            transition: right 0.3s;
        }
        .cart-panel.visible { right: 0; }
        /* Thumbnails and gallery styles */
        .thumbnail { cursor: pointer; }
        /* Responsive design */
        /* Media queries for mobile/tablet/desktop */
    </style>
</head>
<body>
    <header class="p-4">
        <h1 class="text-4xl">Pepe Plush Store</h1>
    </header>
    <main>
        <!-- Product gallery -->
        <section class="gallery p-4">
            <h2 class="text-2xl">Our Products</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- Thumbnails would be populated here -->
                <div class="thumbnail float p-2 border border-green-500">Product 1</div>
                <div class="thumbnail float p-2 border border-green-500">Product 2</div>
                <!-- More products -->
            </div>
        </section>
        <!-- Customer reviews section -->
        <section class="reviews p-4">
            <h2 class="text-2xl">Customer Reviews</h2>
            <div class="review">Great plushie!</div>
            <!-- More reviews -->
        </section>
        <!-- FAQ accordion -->
        <section class="faq p-4">
            <h2 class="text-2xl">Frequently Asked Questions</h2>
            <div class="faq-item">
                <h3 class="faq-question" onclick="this.nextElementSibling.classList.toggle('hidden')">What is the return policy?</h3>
                <p class="faq-answer hidden">You can return within 30 days.</p>
            </div>
            <!-- More FAQ items -->
        </section>
        <!-- Image Upload Modal -->
        <section class="upload-modal p-4">
            <h2 class="text-2xl">Upload Your Image</h2>
            <div class="drag-drop-area">
                <input type="file" id="file-upload" class="hidden" />
                <div class="drag-drop" onclick="document.getElementById('file-upload').click()" ondragover="event.preventDefault()" ondragleave="event.preventDefault()" ondrop="handleDrop(event)">Drag & Drop Your Image Here</div>
            </div>
        </section>
        <button id="cart-toggle" onclick="toggleCart()">Toggle Cart</button>
        <div class="cart-panel" id="cart-panel">
            <h2>Your Cart</h2>
            <!-- Cart contents here -->
        </div>
    </main>
    <script>
        function toggleCart() {
            document.getElementById('cart-panel').classList.toggle('visible');
        }
        function handleDrop(event) {
            event.preventDefault();
            const file = event.dataTransfer.files[0];
            // Handle file upload logic
        }
    </script>
</body>
</html>
